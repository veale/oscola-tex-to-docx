% oscola2docx.cfg
% tex4ht configuration for OSCOLA -> docx conversion

% Prevent TeX from stopping on errors (avoids hanging at ? prompt)
\nonstopmode

% Disable luaotfload callbacks that cause infinite loops in DVI mode.
% luaotfload is baked into the lualatex format and registers a define_font
% callback that hangs when processing fonts under dvilualatex.
\ifdefined\directlua
  \directlua{dofile("disable-luaotfload.lua")}
\fi

\Preamble{xhtml,fn-in,charset=utf-8}

% --- Text styling ---
\Configure{emph}{\ifvmode\ShowPar\fi\HCode{<em>}}{\HCode{</em>}}
\Configure{textit}{\ifvmode\ShowPar\fi\HCode{<em>}}{\HCode{</em>}}
\Configure{textbf}{\ifvmode\ShowPar\fi\HCode{<strong>}}{\HCode{</strong>}}
\Configure{textsc}{\ifvmode\ShowPar\fi\HCode{<span class="smallcaps">}}{\HCode{</span>}}

% --- Figures ---
% Wrap figure floats in <figure> so Pandoc produces proper image blocks
\ConfigureEnv{figure}
  {\ifvmode\IgnorePar\fi\EndP\HCode{<figure>}}
  {\ifvmode\IgnorePar\fi\EndP\HCode{</figure>}}{}{}
\ConfigureEnv{figure*}
  {\ifvmode\IgnorePar\fi\EndP\HCode{<figure>}}
  {\ifvmode\IgnorePar\fi\EndP\HCode{</figure>}}{}{}

% --- Captions ---
\Configure{caption}{\HCode{<figcaption>}}{}{\HCode{</figcaption>}}

% --- Tables ---
% Wrap table floats so captions are preserved
\ConfigureEnv{table}
  {\ifvmode\IgnorePar\fi\EndP\HCode{<div class="table-wrap">}}
  {\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}{}{}
\ConfigureEnv{table*}
  {\ifvmode\IgnorePar\fi\EndP\HCode{<div class="table-wrap">}}
  {\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}{}{}

% --- Landscape pages (pdflscape) ---
% Neutralise: landscape orientation has no HTML/DOCX equivalent
\ConfigureEnv{landscape}{}{}{}{}

% --- Fix biblatex-oscola/verbose-inote \footcite stack overflow ---
%
% Root cause: verbose-inote's footcite:save macro does:
%     \label{cbx@\the\value{instcount}}
% and footcite:note:old does:
%     \ref{cbx@\csuse{cbx@f@\thefield{entrykey}}}
%
% tex4ht redefines \label and \ref with heavy expansion involving
% \Protect\l::bel and \edef that recurses when called inside footnote
% citation processing, causing TeX capacity overflow.
%
% Fix: save the original LaTeX \label and \ref before tex4ht redefines
% them, and use those originals inside footcite:save and footcite:note:old.
% This means "(n X)" back-references won't be hyperlinked in HTML, but
% they'll still resolve correctly via the standard .aux mechanism.

\begin{document}
\EndPreamble
